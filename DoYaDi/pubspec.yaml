name: doyadi
description: "Race wheel and controller app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  sensors_plus: ^7.0.0
  wakelock_plus: ^1.5.2
  shared_preferences: ^2.5.5
  flutter_bluetooth_serial: ^0.4.0
  permission_handler: ^11.3.1
  perfect_volume_control: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

# --- İKON AYARLARI ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#09090B"
  adaptive_icon_foreground: "assets/icon.png"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48

# --- AÇILIŞ EKRANI AYARLARI ---
flutter_native_splash:
  color: "#09090B"
  image: assets/icon.png
  android_12: 
    image: assets/icon.png
    icon_background_color: "#09090B"